<div class="backdrop is-open">
  <div class="modal">
    <button type="button" class="modal-close-btn">
      <svg class="modal-close-btn-svg" width="32" height="32">
        <use href="../img/sprite.svg#icon-close"></use>
      </svg>
    </button>
    <div class="product-modal">
      <div class="product-gallery">
        <img src="${images[0]}" class="main-img" alt="Product image" />
        <div class="thumb-list">
          <img src="${images[1]}" class="thumb" alt="Preview image" />
          <img src="${images[2]}" class="thumb" alt="Preview image" />
        </div>
      </div>

      <div class="product-info">
        <h2 class="product-title">Назва</h2>
        <p class="category">Категорія</p>
        <p class="price">Ціна</p>
        <div class="rating">зірочки</div>
        <div class="product-colors">
          <p class="label">Колір</p>
          <ul class="color-checkbox-list">
            <li class="color-checkbox-item">
              <label class="color-checkbox-label">
                <input
                  type="checkbox"
                  name="color"
                  value="grey"
                  class="color-checkbox-input"
                  checked
                />
                <span
                  class="color-checkbox-marker"
                  style="background-color: #c7c3bb"
                ></span>
              </label>
            </li>
            <li class="color-checkbox-item">
              <label class="color-checkbox-label">
                <input
                  type="checkbox"
                  name="color"
                  value="beige"
                  class="color-checkbox-input"
                />
                <span
                  class="color-checkbox-marker"
                  style="background-color: #c7aa80"
                ></span>
              </label>
            </li>
            <li class="color-checkbox-item">
              <label class="color-checkbox-label">
                <input
                  type="checkbox"
                  name="color"
                  value="dark"
                  class="color-checkbox-input"
                />
                <span
                  class="color-checkbox-marker"
                  style="background-color: #201a19"
                ></span>
              </label>
            </li>
          </ul>
        </div>
        <div class="description">
          <p class="description-text">Опис</p>
          <p class="description-text">Опис розміру</p>
        </div>
        <button class="order-btn" data-id="${id}">Перейти до замовлення</button>
      </div>
    </div>
  </div>
</div>
